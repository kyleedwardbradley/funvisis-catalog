name: update-catalog
on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install tesseract (Spanish) for report-image OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-spa
      - run: pip install requests pillow pytesseract
      - run: python -m funvisis update --csv funvisis_catalog.csv
      - name: commit refreshed CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add funvisis_catalog.csv funvisis_catalog.meta.json
          git diff --cached --quiet || git commit -m "data: refresh from report images (OCR)"
          git push
